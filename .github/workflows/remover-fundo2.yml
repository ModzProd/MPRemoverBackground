name: Remover Fundo de Imagem

on:
  workflow_dispatch:
    inputs:
      imagem_entrada:
        description: 'Caminho da imagem original (ex: imagens/minha_foto.jpg)'
        required: true
        default: 'input/d19ddf2f54daa059.png'
      pasta_saida:
        description: 'Pasta onde a imagem sem fundo será salva (ex: output/)'
        required: true
        default: 'output/'

jobs:
  remover_fundo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Baixar o repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar bibliotecas necessárias
        run: |
          pip install rembg pillow onnxruntime

      - name: ✂️ Remover fundo da imagem (Modelo Avançado ISNet)
        env:
          IMAGEM_ENTRADA: ${{ github.event.inputs.imagem_entrada }}
          PASTA_SAIDA: ${{ github.event.inputs.pasta_saida }}
        run: |
          python -c "
          import os
          from rembg import remove
          from PIL import Image

          input_path = os.environ['IMAGEM_ENTRADA']
          output_dir = os.environ['PASTA_SAIDA']
          
          nome_arquivo = os.path.basename(input_path)
          nome_base, _ = os.path.splitext(nome_arquivo)
          
          output_path = os.path.join(output_dir, f'{nome_base}.png')
          
          os.makedirs(output_dir, exist_ok=True)
          
          with open(input_path, 'rb') as i:
              input_data = i.read()
              # AQUI ESTÁ A MUDANÇA: Usando o modelo isnet-general-use
              output_data = remove(input_data, model_name='isnet-general-use')
          
          with open(output_path, 'wb') as o:
              o.write(output_data)
              
          print(f'Imagem salva com sucesso em: {output_path}')
          "

      - name: 🚀 Enviar imagem processada para o repositório
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat: fundo removido (ISNet) da imagem ${{ github.event.inputs.imagem_entrada }}"
